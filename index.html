<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSC Interoperability Event 2026 - Scenario Mapping</title>
    <meta name="description" content="A mapping of EUDI Wallet participants to Cloud Signature Consortium (CSC) interoperability scenarios.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header>
        <div class="container">
            <h1 class="glow-text">CSC Event Wallet</h1>
            <p class="subtitle">Interoperability Scenario Mapping & Participant Directory</p>
        </div>
    </header>

    <main class="container">
        <section class="controls card glass">
            <div class="search-box">
                <input type="text" id="companySearch" placeholder="Search by company or participant...">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">All Scenarios</button>
                <button class="filter-btn" data-filter="Core">Core Scenarios</button>
                <button class="filter-btn" data-filter="Advanced">Advanced Scenarios</button>
            </div>
        </section>

        <section class="mapping-grid" id="mappingGrid">
            <!-- Data will be injected here -->
            <div class="loader">
                <div class="spinner"></div>
                <p>Loading scenario data...</p>
            </div>
        </section>
    </main>

    <footer class="container">
        <p>&copy; 2026 Cloud Signature Consortium | EUDI Wallet Interoperability Event</p>
    </footer>

    <!-- Modal for details -->
    <div id="modal" class="modal">
        <div class="modal-content glass">
            <span class="close-btn">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
