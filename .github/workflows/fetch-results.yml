name: Fetch Formspree Results

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Allow manual triggers from the GitHub Actions UI

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run Fetch Results Script
        env:
          FORMSPREE_API_KEY: ${{ secrets.FORMSPREE_API_KEY }}
        run: node fetch_results.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add results.csv
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update interop results from Formspree" && git push)
